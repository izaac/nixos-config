name: Cave-Check
on:
  push:
    branches: [main]
    paths:
      - "**/*.nix"
      - "**/*.md"
      - "flake.lock"
  pull_request:
    branches: [main]
    paths:
      - "**/*.nix"
      - "**/*.md"
      - "flake.lock"

jobs:
  check-stones:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Cave
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Cave Key (ssh for private claude-skills input)
        uses: webfactory/ssh-agent@a6f90b1f127823b31d4d4a8d96047790581349bd # v0.9.1
        with:
          ssh-private-key: ${{ secrets.CLAUDE_SKILLS_DEPLOY_KEY }}

      - name: Trust GitHub host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Build Fire (Nix)
        uses: cachix/install-nix-action@e4f4bde15728394ded896ef07491a85f2eb24956 # v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Magic Eye (nix flake check — treefmt + linters)
        run: nix flake check
