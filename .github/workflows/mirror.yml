name: Cave-Mirror
on:
  push:
    branches: [main]
jobs:
  mirror-to-codeberg:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Cave
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Mirror Move
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: git@codeberg.org:izaac/nixos-config.git
          ssh_private_key: ${{ secrets.CODEBERG_SSH_KEY }}
