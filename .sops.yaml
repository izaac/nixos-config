keys:
  # User keys — for editing secrets from each workstation. Derived from each
  # machine's user SSH key via `ssh-to-age < ~/.ssh/id_ed25519.pub`.
  - &user_ninja age1nwq5tyajnlazht863sgd6jl4p3jvu4ukf8df3yxpqugktfau2deqpvyr42
  - &user_mac age1c2tvqnc3gu3vhgvyfa8yqhl5jts2mpmzf442cqmpqesacdpr69sq9dzdqd
  # Host keys — for boot-time decryption via sops-nix `sshKeyPaths`. Derived
  # from /etc/ssh/ssh_host_ed25519_key.pub. ninja and windy currently share
  # the same host key; split when windy rotates.
  - &host_shared age1cjc00x0g5mhejndsh3ljz09ukkl38kutd692aatd3qw0jrmxx3sq4tk5av

creation_rules:
  # Common secrets — readable by every host and every editor.
  - path_regex: secrets/common\.yaml$
    key_groups:
      - age:
          - *user_ninja
          - *user_mac
          - *host_shared

  # Per-host slots — pre-wired so adding host-specific secrets is a one-step
  # `sops secrets/<host>.yaml` away. Same recipients today; tighten when
  # windy gets its own host key.
  - path_regex: secrets/ninja\.yaml$
    key_groups:
      - age:
          - *user_ninja
          - *user_mac
          - *host_shared
  - path_regex: secrets/windy\.yaml$
    key_groups:
      - age:
          - *user_ninja
          - *user_mac
          - *host_shared
